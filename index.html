<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>

/* =========================
   BACKGROUND: LINED PAPER
========================= */
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Arial;
  color:#141414;
  background:
    repeating-linear-gradient(
      to bottom,
      #ffffff 0px,
      #ffffff 28px,
      #e9e9e9 29px
    );
  background-attachment: fixed;
}

/* soft overlay wash */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(245,247,255,0.7));
  pointer-events:none;
}

/* =========================
   HEADER
========================= */
header{
  position:relative;
  padding:70px 20px 20px;
  text-align:center;
}

h1{
  margin:0;
  font-size:44px;
  letter-spacing:-0.8px;
}

.subtitle{
  color:#666;
  margin-top:8px;
}

/* =========================
   SEARCH
========================= */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:18px 0 10px;
  position:relative;
}

input{
  width:420px;
  max-width:92%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  background:rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  outline:none;
}

/* =========================
   GRID
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:18px;
  padding:30px 35px 80px;
  position:relative;
}

/* =========================
   CATEGORY BASE (GLASS CARD)
========================= */
.category{
  border-radius:18px;
  padding:14px;
  backdrop-filter: blur(16px);
  background: rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.05);
  position:relative;
  overflow:hidden;
}

/* top glow bar */
.category::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  height:4px;
  width:100%;
}

/* CATEGORY COLORS */
.cat-ai::before{ background:#7c5cff; }
.cat-brand::before{ background:#ff5c93; }
.cat-logo::before{ background:#ffb347; }
.cat-type::before{ background:#4dd4ac; }
.cat-assets::before{ background:#4aa3ff; }
.cat-mockup::before{ background:#ff7a59; }
.cat-audio::before{ background:#9b6cff; }
.cat-dev::before{ background:#2dd4bf; }
.cat-edit::before{ background:#60a5fa; }
.cat-science::before{ background:#34d399; }
.cat-fun::before{ background:#f472b6; }

/* title */
.category h2{
  font-size:12px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  margin:6px 0 12px;
  color:#333;
}

/* =========================
   TOOL CARD
========================= */
.tool{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  padding:10px;
  margin:6px 0;
  border-radius:12px;

  background: rgba(255,255,255,0.4);
  border:1px solid rgba(255,255,255,0.6);

  transition:0.18s ease;
}

.tool:hover{
  transform: translateY(-1px);
  background: rgba(255,255,255,0.75);
}

.tool img{
  width:22px;
  height:22px;
  border-radius:6px;
}

.tool b{
  font-size:13px;
}

.tool small{
  font-size:11px;
  color:#777;
}

.hidden{display:none;}

</style>
</head>

<body>

<header>
  <h1>Vine & Vector Toolkit</h1>
  <div class="subtitle">A curated creative freelancer dashboard</div>

  <div class="searchWrap">
    <input id="search" placeholder="Search tools..." />
  </div>
</header>

<div class="grid" id="app"></div>

<script>

]
}

];

/* =========================
   RENDER
========================= */

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category " + cat.class;

    let html = `<h2>${cat.name}</h2>`;

    cat.tools.forEach(t=>{
      const icon = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;

      html += `
        <a class="tool" href="${t[1]}" target="_blank">
          <img src="${icon}">
          <div>
            <b>${t[0]}</b>
            <small>${t[2]}</small>
          </div>
        </a>
      `;
    });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();

  document.querySelectorAll(".tool").forEach(t=>{
    t.style.display = t.innerText.toLowerCase().includes(val)
      ? "flex"
      : "none";
  });
});

</script>

</body>
</html>
