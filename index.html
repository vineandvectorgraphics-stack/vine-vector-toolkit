<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creative Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<div class="hero-inner">

<h1>Creative Library</h1>

<p>
A curated collection of design tools, AI resources,
creative inspiration, maps, experiments and internet discoveries.
</p>

<input
id="search"
type="text"
placeholder="Search resources..."

>

<div class="stats">

<span>100+ Resources</span>

<span>15 Categories</span>

<span>Curated by Kate</span>

</div>

</div>

</header>

<nav id="nav"></nav>

<main id="app"></main>

<script src="data.js"></script>

<script>

const app =
document.getElementById("app");

const nav =
document.getElementById("nav");

const groups = [

{
title:"🚀 CREATE",
color:"#ff7b54",

categories:[
"AI & Generative Tools",
"Branding & Identity",
"Typography & Fonts",
"Color & Gradients",
"Image Editing & Optimization",
"Illustration Libraries",
"Stock Assets & Vectors",
"Mockups"
]
},

{
title:"💡 INSPIRE",
color:"#9b5de5",

categories:[
"Design Inspiration",
"Maps, Geography & Travel",
"Creative Experiments"
]
},

{
title:"🛠️ BUILD",
color:"#4361ee",

categories:[
"Web Design & UI Systems",
"Coding & Development",
"3D, Motion & Animation",
"Audio & Music"
]
},

{
title:"📈 GROW",
color:"#14b86f",

categories:[
"Productivity & Collaboration",
"Portfolio & Freelance",
"Learning & Education"
]
}

];

function render(){

app.innerHTML="";
nav.innerHTML="";

groups.forEach(group=>{

app.innerHTML += `

<div
class="section-header"
style="
color:${group.color};
border-color:${group.color};
">

<h2>${group.title}</h2>

</div>

`;

group.categories.forEach(categoryName=>{

const category =
data.find(item =>
item.name === categoryName
);

if(!category) return;

nav.innerHTML += `

<a href="#${category.name}">
${category.icon}
${category.name}
</a>

`;

let cards="";

category.tools.forEach(tool=>{

cards += `

<a
class="tool"
href="${tool.url}"
target="_blank">

<img
class="tool-logo"
src="${tool.logo}"
alt="${tool.name}">

<h3>${tool.name}</h3>

<p>${tool.description}</p>

<div class="tags">

${tool.tags.map(tag =>
`<span>${tag}</span>`
).join("")}

</div>

</a>

`;

});

app.innerHTML += `

<section
class="category"
id="${category.name}">

<h2
class="category-title"
style="
color:${category.color};
border-color:${category.color};
">

${category.icon}
${category.name}

</h2>

<div class="grid">

${cards}

</div>

</section>

`;

});

});

}

render();

document
.getElementById("search")
.addEventListener("input",e=>{

const search =
e.target.value.toLowerCase();

document
.querySelectorAll(".tool")
.forEach(card=>{

const text =
card.textContent.toLowerCase();

card.style.display =
text.includes(search)
? "block"
: "none";

});

});

</script>

</body>

</html>
