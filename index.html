<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vine & Vector Toolkit</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f7f3ee;
}

/* HEADER */
header{
  padding:40px;
  text-align:center;
}

h1{
  margin:0;
  font-size:42px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  padding:40px;
}

/* CATEGORY CARD */
.category{
  background:white;
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.category h2{
  margin-top:0;
}

/* TOOL CARD */
.tool{
  display:flex;
  gap:10px;
  align-items:center;
  text-decoration:none;
  padding:10px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #eee;
  transition:0.2s;
  background:#fff;
}

.tool:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.tool img{
  width:26px;
  height:26px;
  border-radius:6px;
}

.tool b{
  display:block;
  font-size:14px;
}

.tool small{
  font-size:11px;
  color:#666;
}

</style>
</head>

<body>

<header>
  <h1>🌿 Vine & Vector Toolkit</h1>
  <p>Auto-generated creative resource library</p>
</header>

<div class="grid" id="app"></div>

<script>
const data = [
{
  name:"🌐 Generative AI",
  tools:[
   [
["Adobe Firefly","https://firefly.adobe.com","AI image generation"],
["Artbreeder","https://www.artbreeder.com","Image blending AI"],
["Claude","https://claude.ai","AI assistant"],
["DeepAI","https://deepai.org","AI tools suite"],
["ElevenLabs","https://elevenlabs.io","AI voice generation"],
["Google Labs","https://labs.google.com","Experimental AI tools"],
["Google Pomelli","https://labs.google.com","Google experimental AI tool"],
["Hugging Face Spaces","https://huggingface.co/spaces","AI model hosting & demos"],
["Krea AI","https://www.krea.ai","Real-time AI generation"],
["Leonardo AI","https://leonardo.ai","AI image creation"],
["Luma AI","https://lumalabs.ai","3D + video generation AI"],
["Napkin AI","https://napkin.ai","AI ideation tool"],
["Perplexity","https://www.perplexity.ai","AI search engine"],
["Pika","https://pika.art","AI video generation"],
["Playground AI","https://playgroundai.com","AI image generator"],
["Runable","https://runable.com","AI dev tools platform"],
["Stable Diffusion","https://stability.ai","Open image generation model"],
["Suno","https://suno.com","AI music generation"],
["Udio","https://www.udio.com","AI music creation"],
["Unicorn Studio","https://unicorn.studio","3D + motion AI tools"]
  ]
},
{
  name:"🎨 Branding",
  tools:[
    ["BP&O","https://bpando.org","Brand inspiration"],
    ["Identity Designed","https://identitydesigned.com","Brand identity"]
  ]
},
{
  name:"📦 Design Assets",
  tools:[
    ["Unsplash","https://unsplash.com","Free photos"],
    ["Freepik","https://freepik.com","Vectors & assets"],
    ["Figma Community","https://figma.com/community","Design files"]
  ]
},
{
  name:"🖼 Mockups",
  tools:[
    ["Mockup World","https://mockupworld.co","Free mockups"],
    ["Screely","https://screely.com","UI screenshots"]
  ]
},
{
  name:"🎬 Motion & 3D",
  tools:[
    ["Runway","https://runwayml.com","AI video"],
    ["Pika","https://pika.art","AI motion"],
    ["Sketchfab","https://sketchfab.com","3D models"]
  ]
}
];

function createCategory(cat){
  const div = document.createElement("div");
  div.className = "category";

  let html = `<h2>${cat.name}</h2>`;

  cat.tools.forEach(t=>{
    const icon = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;
    html += `
      <a class="tool" href="${t[1]}" target="_blank">
        <img src="${icon}">
        <div>
          <b>${t[0]}</b>
          <small>${t[2]}</small>
        </div>
      </a>
    `;
  });

  div.innerHTML = html;
  return div;
}

const app = document.getElementById("app");

data.forEach(cat=>{
  app.appendChild(createCategory(cat));
});
</script>

</body>
</html>
