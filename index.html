<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, Arial;
  background:
    repeating-linear-gradient(
      to bottom,
      #fff 0px,
      #fff 28px,
      #f3f3f3 29px
    );
  color:#111;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px 10px;
}

h1{
  margin:0;
  font-size:44px;
  color:#000;
  letter-spacing:-1px;
}

.subtitle{
  color:#666;
  margin-top:8px;
}

/* SEARCH */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:20px 0 30px;
}

input{
  width:420px;
  max-width:90%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  background:white;
}

/* GRID */
.grid{
  column-count:3;
  column-gap:18px;
  padding:20px 30px 80px;
}

@media(max-width:1000px){ .grid{column-count:2;} }
@media(max-width:650px){ .grid{column-count:1;} }

/* CATEGORY CARD */
.category{
  break-inside: avoid;
  margin-bottom:18px;

  border-radius:18px;
  padding:14px;

  background:rgba(255,255,255,0.75);
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  backdrop-filter: blur(10px);
}

/* CATEGORY HEADER */
.catTitle{
  font-size:12px;
  font-weight:800;
  letter-spacing:1px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

/* TOOL */
.tool{
  display:flex;
  gap:10px;
  padding:8px;
  margin:6px 0;
  border-radius:10px;
  text-decoration:none;
  color:#111;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(0,0,0,0.04);
  transition:0.15s ease;
}

.tool:hover{
  transform:translateY(-2px);
  background:white;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.tool img{
  width:18px;
  height:18px;
  border-radius:4px;
}

small{color:#666;font-size:11px;}

.hidden{display:none;}
</style>
</head>

<body>

<header>
  <h1>Vine & Vector Toolkit</h1>
  <div class="subtitle">Premium Freelancer Resource Dashboard</div>
</header>

<div class="searchWrap">
  <input id="search" placeholder="Search tools, AI, design, dev..." />
</div>

<div class="grid" id="app"></div>

<script>

]
}

];

/* =========================
RENDER
========================= */

const app = document.getElementById("app");

function render(){
  app.innerHTML = "";

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category";

    let html = `
      <div class="catTitle" style="color:${cat.color}">
        <span>${cat.name}</span>
      </div>
    `;

    cat.tools.forEach(t=>{
      const icon = "https://www.google.com/s2/favicons?sz=64&domain=" + new URL(t[1]).hostname;

      html += `
        <a class="tool" href="${t[1]}" target="_blank">
          <img src="${icon}">
          <div>
            <b>${t[0]}</b><br>
            <small>${t[1].replace("https://","")}</small>
          </div>
        </a>
      `;
    });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  const v = e.target.value.toLowerCase();

  document.querySelectorAll(".category").forEach(cat=>{
    cat.style.display = cat.innerText.toLowerCase().includes(v)
      ? "block"
      : "none";
  });
});
</script>

</body>
</html>
