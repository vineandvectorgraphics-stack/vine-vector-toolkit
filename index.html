<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Arial;
  background:#f4f2ee;
  color:#141414;
}

/* HEADER */
header{
  padding:50px 20px 20px;
  text-align:center;
}

h1{
  margin:0;
  font-size:40px;
  letter-spacing:-0.5px;
}

.subtitle{
  color:#666;
  margin-top:10px;
}

/* SEARCH */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:18px 0 10px;
}

input{
  width:420px;
  max-width:92%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
  background:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:18px;
  padding:30px 35px 80px;
}

/* CATEGORY */
.category{
  background:#fff;
  border:1px solid #e7e5e0;
  border-radius:16px;
  padding:14px;
}

.category h2{
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin:6px 0 12px;
  color:#333;
}

/* TOOL */
.tool{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  padding:9px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid transparent;
  transition:0.15s ease;
}

.tool:hover{
  background:#fafafa;
  border:1px solid #eee;
}

.tool img{
  width:22px;
  height:22px;
  border-radius:5px;
}

.tool b{
  font-size:13px;
}

.tool small{
  font-size:11px;
  color:#777;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>
  <h1>Vine & Vector Toolkit</h1>
  <div class="subtitle">Freelancer creative dashboard</div>

  <div class="searchWrap">
    <input id="search" placeholder="Search tools..." />
  </div>
</header>

<div class="grid" id="app"></div>

/* =========================
   RENDER
========================= */

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category";

    let html = `<h2>${cat.name}</h2>`;

    cat.tools.forEach(t=>{
      const icon = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;

      html += `
        <a class="tool" href="${t[1]}" target="_blank">
          <img src="${icon}">
          <div>
            <b>${t[0]}</b>
            <small>${t[2]}</small>
          </div>
        </a>
      `;
    });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();

  document.querySelectorAll(".tool").forEach(t=>{
    t.style.display = t.innerText.toLowerCase().includes(val)
      ? "flex"
      : "none";
  });
});

</script>

</body>
</html>
