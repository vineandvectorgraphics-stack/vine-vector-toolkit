<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f7f3ee;
  color:#111;
}

header{
  text-align:center;
  padding:40px 20px;
}

h1{
  margin:0;
  font-size:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  padding:20px 40px 60px;
}

.category{
  background:#fff;
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.category h2{
  margin-top:0;
}

.tool{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  padding:10px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #eee;
  background:#fff;
  transition:0.2s;
}

.tool:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.tool img{
  width:26px;
  height:26px;
  border-radius:6px;
}

.tool b{
  display:block;
  font-size:14px;
}

.tool small{
  display:block;
  font-size:11px;
  color:#666;
}
</style>
</head>

<body>

<header>
  <h1>🌿 Vine & Vector Toolkit</h1>
  <p>Creative resources for designers</p>
</header>

<div class="grid" id="app"></div>

function createCategory(cat){
  const div = document.createElement("div");
  div.className = "category";

  let html = `<h2>${cat.name}</h2>`;

  cat.tools.forEach(t=>{
    const icon = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;
    html += `
      <a class="tool" href="${t[1]}" target="_blank">
        <img src="${icon}">
        <div>
          <b>${t[0]}</b>
          <small>${t[2]}</small>
        </div>
      </a>
    `;
  });

  div.innerHTML = html;
  return div;
}

const app = document.getElementById("app");
data.forEach(cat => app.appendChild(createCategory(cat)));
