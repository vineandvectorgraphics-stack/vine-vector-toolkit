<!DOCTYPE html>

<meta charset="UTF-8" />

<style>
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, Arial;
  background:
    repeating-linear-gradient(
      to bottom,
      #fff 0px,
      #fff 28px,
      #f2f2f2 29px
    );
  color:#111;
}

header{
  text-align:center;
  padding:50px 20px 10px;
}

h1{margin:0;font-size:42px;color:#000;}
.subtitle{color:#666}

.searchWrap{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

input{
  width:420px;
  max-width:90%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
}

.grid{
  column-count:3;
  column-gap:18px;
  padding:30px;
}

@media(max-width:1000px){.grid{column-count:2}}
@media(max-width:650px){.grid{column-count:1}}

.category{
  break-inside: avoid;
  margin-bottom:18px;
  border-radius:16px;
  padding:14px;
  background:rgba(255,255,255,0.85);
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.catTitle{
  font-size:13px;
  font-weight:700;
  margin-bottom:10px;
}

.tool{
  display:flex;
  gap:10px;
  padding:8px;
  margin:6px 0;
  border-radius:10px;
  text-decoration:none;
  color:#111;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(0,0,0,0.05);
}

.tool:hover{background:#fff}

.tool img{
  width:18px;height:18px;border-radius:4px;
}

small{color:#666}
</style>
</head>

<div class="subtitle">Complete Creative Resource Library</div>
</header>

<div class="searchWrap">
<input id="search" placeholder="Search tools..." />

<div class="grid" id="app"></div>

/* =========================
RENDER
========================= */

const app=document.getElementById("app");

function render(){
app.innerHTML="";

data.forEach(cat=>{
const div=document.createElement("div");
div.className="category";

let html=`<div class="catTitle" style="color:${cat.color}">${cat.name}</div>`;

cat.tools.forEach(t=>{
const icon="https://www.google.com/s2/favicons?sz=64&domain="+new URL(t[1]).hostname;

html+=`
<a class="tool" href="${t[1]}" target="_blank">
<img src="${icon}">
<div>
<b>${t[0]}</b><br>
<small>${t[1].replace("https://","")}</small>
</div>
</a>`;
});

div.innerHTML=html;
app.appendChild(div);
});
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
const v=e.target.value.toLowerCase();
document.querySelectorAll(".category").forEach(cat=>{
cat.style.display=cat.innerText.toLowerCase().includes(v)?"block":"none";
});
});
