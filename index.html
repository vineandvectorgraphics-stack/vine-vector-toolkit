<style>

/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Arial;
  background:
    repeating-linear-gradient(
      to bottom,
      #ffffff 0px,
      #ffffff 28px,
      #ececec 29px
    );
  color:#111;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.7), rgba(240,242,255,0.6));
  pointer-events:none;
}

/* =========================
   HEADER
========================= */
header{
  text-align:center;
  padding:50px 20px 10px;
}

h1{
  margin:0;
  font-size:42px;
  color:#000;
  font-weight:700;
}

.subtitle{
  color:#000;
  opacity:0.6;
  margin-top:8px;
}

/* =========================
   SEARCH
========================= */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

input{
  width:420px;
  max-width:90%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.1);
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(10px);
}

/* =========================
   GRID
========================= */
.grid{
  column-count:2;
  column-gap:22px;
  padding:30px 40px 100px;
}

@media(max-width:900px){
  .grid{column-count:1;}
}

/* =========================
   CATEGORY BLOCK
========================= */
.category{
  break-inside: avoid;
  margin-bottom:28px;

  border-radius:20px;
  overflow:hidden;

  background:rgba(255,255,255,0.65);
  backdrop-filter: blur(16px);

  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.category h2{
  margin:0;
  padding:14px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1.4px;
  background:rgba(0,0,0,0.03);
  border-left:6px solid var(--c);
  cursor:pointer;
}

/* TOOL */
.tool{
  display:flex;
  gap:10px;
  align-items:center;
  text-decoration:none;

  padding:10px 14px;
  border-bottom:1px solid rgba(0,0,0,0.04);
  transition:0.15s ease;
}

.tool:hover{
  background:rgba(0,0,0,0.03);
}

.tool img{
  width:20px;
  height:20px;
  border-radius:5px;
}

.tool b{font-size:13px;}
.tool small{font-size:11px;color:#666;}

.collapsed .tool{display:none;}

</style>
</head>

/* =========================
   RENDER
========================= */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  data.forEach(cat=>{
    const div=document.createElement("div");
    div.className="category";
    div.style.setProperty("--c",cat.color);

    let html=`<h2 onclick="toggle(this)">${cat.name}</h2>`;

    cat.tools.forEach(t=>{
      const icon=`https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;

      html+=`
      <a class="tool" href="${t[1]}" target="_blank">
        <img src="${icon}">
        <div>
          <b>${t[0]}</b><br>
          <small>${t[1]}</small>
        </div>
      </a>`;
    });

    div.innerHTML=html;
    app.appendChild(div);
  });
}

render();

function toggle(el){
  el.parentElement.classList.toggle("collapsed");
}

/* search */
document.getElementById("search").addEventListener("input",e=>{
  const v=e.target.value.toLowerCase();

  document.querySelectorAll(".category").forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(v)
      ?"block":"none";
  });
});
