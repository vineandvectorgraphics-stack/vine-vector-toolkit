<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creative Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<h1>Creative Library</h1>

<p>
My favorite design tools, AI resources, mockups,
fonts, inspiration websites, stock assets and more.
</p>

<input
id="search"
placeholder="Search resources..."
>

<div class="stats">

 <span>✨ Curated by Kate</span>
  <span>🎨 Designer Resources</span>
  <span>🚀 Always Growing</span>
  
</div>

</header>

<nav id="nav"></nav>

<main id="app"></main>

<script src="data.js"></script>

<script>

const app =
document.getElementById("app");

const nav =
document.getElementById("nav");

function render(){

app.innerHTML="";
nav.innerHTML="";

data.forEach(category=>{

nav.innerHTML += `

<a href="#${category.name}">

${category.icon}
${category.name}
(${category.tools.length})

</a>

`;

let cards="";

category.tools.forEach(tool=>{

cards += `

<a
class="tool"
href="${tool.url}"
target="_blank">

<img
class="tool-logo"
src="${tool.logo}"
alt="${tool.name}"
loading="lazy">

<h3>${tool.name}</h3>

<p>
${tool.description}
</p>

<div class="tags">

${tool.tags.map(tag =>
`<span>${tag}</span>`
).join("")}

</div>

<div class="visit">
Visit Resource →
</div>

</a>

`;

});

app.innerHTML += `

<section
class="category"
id="${category.name}">

<h2
style="
color:${category.color};
border-color:${category.color};
">

${category.icon}
${category.name}

</h2>

<div class="grid">

${cards}

</div>

</section>

`;

});

}

render();

document
.getElementById("search")
.addEventListener("input",e=>{

const search =
e.target.value.toLowerCase();

document
.querySelectorAll(".tool")
.forEach(card=>{

const text =
card.textContent.toLowerCase();

card.style.display =
text.includes(search)
? "block"
: "none";

});

});

</script>

</body>
</html>
