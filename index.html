<style>
/* =========================
  BACKGROUND (LINED PAPER)
========================= */
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, Arial;

  background:
    repeating-linear-gradient(
      to bottom,
      #ffffff 0px,
      #ffffff 28px,
      #f3f3f3 29px
    );

  color:#111;
}

/* soft glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.8), rgba(240,242,255,0.6));
  pointer-events:none;
}

/* =========================
  HEADER
========================= */
header{
  text-align:center;
  padding:60px 20px 10px;
}

h1{
  margin:0;
  font-size:44px;
  letter-spacing:-0.5px;
  color:#000;
}

.subtitle{
  color:#666;
  margin-top:8px;
}

/* =========================
  SEARCH
========================= */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:20px 0 10px;
}

input{
  width:420px;
  max-width:90%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.1);
  background:rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
}

/* =========================
  GRID
========================= */
.grid{
  column-count:3;
  column-gap:18px;
  padding:30px 40px 80px;
}

@media(max-width:1000px){ .grid{column-count:2;} }
@media(max-width:650px){ .grid{column-count:1;} }

/* =========================
  CATEGORY CARD (GLASS)
========================= */
.category{
  break-inside: avoid;
  margin-bottom:18px;

  background:rgba(255,255,255,0.65);
  border:1px solid rgba(255,255,255,0.8);
  backdrop-filter: blur(16px);

  border-radius:18px;
  padding:14px;

  box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

/* category header */
.catTitle{
  font-size:12px;
  font-weight:800;
  letter-spacing:1.2px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

/* TOOL */
.tool{
  display:flex;
  gap:10px;
  padding:9px;
  margin:6px 0;
  border-radius:12px;
  text-decoration:none;
  color:#111;

  background:rgba(255,255,255,0.6);
  border:1px solid rgba(0,0,0,0.05);

  transition:0.15s ease;
}

.tool:hover{
  transform:translateY(-2px);
  background:white;
}

.tool img{
  width:18px;
  height:18px;
  border-radius:4px;
}

small{color:#666;font-size:11px;}
</style>
</head>

<div class="searchWrap">

/* =========================
  RENDER ENGINE
========================= */

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category";

    let html = `
      <div class="catTitle" style="color:${cat.color}">
        <span>${cat.name}</span>
      </div>
    `;

    cat.tools
      .sort((a,b)=>a[0].localeCompare(b[0]))
      .forEach(t=>{
        const icon =
          "https://www.google.com/s2/favicons?sz=64&domain=" +
          new URL(t[1]).hostname;

        html += `
          <a class="tool" href="${t[1]}" target="_blank">
            <img src="${icon}">
            <div>
              <b>${t[0]}</b><br>
              <small>${t[1].replace("https://","")}</small>
            </div>
          </a>
        `;
      });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  const v = e.target.value.toLowerCase();

  document.querySelectorAll(".category").forEach(cat=>{
    cat.style.display = cat.innerText.toLowerCase().includes(v)
      ? "block"
      : "none";
  });
});
