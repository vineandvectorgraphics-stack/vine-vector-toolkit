<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Arial;
  background:#f6f4f1;
  color:#1a1a1a;
}

/* HEADER */
header{
  padding:50px 20px 30px;
  text-align:center;
}

h1{
  margin:0;
  font-size:42px;
  letter-spacing:-0.5px;
}

p{
  color:#666;
  margin-top:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:22px;
  padding:30px 40px 70px;
}

/* CATEGORY CARD */
.category{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.04);
  border:1px solid #eee;
}

.category h2{
  font-size:16px;
  margin:0 0 12px;
  letter-spacing:0.2px;
}

/* TOOL ITEM */
.tool{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  padding:10px 10px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid transparent;
  transition:0.2s ease;
}

.tool:hover{
  background:#fafafa;
  border:1px solid #eee;
  transform:translateY(-1px);
}

.tool img{
  width:22px;
  height:22px;
  border-radius:5px;
  flex-shrink:0;
}

.tool b{
  font-size:13px;
  display:block;
}

.tool small{
  font-size:11px;
  color:#777;
}
</style>
</head>

<body>

<header>
  <h1>Vine & Vector Toolkit</h1>
  <p>Freelancer creative resource system</p>
</header>

<div class="grid" id="app"></div>

<script>

========================= */

{

];

/* =========================
   RENDER
========================= */

function createCategory(cat){
  const div = document.createElement("div");
  div.className = "category";

  let html = `<h2>${cat.name}</h2>`;

  cat.tools.forEach(t=>{
    const icon = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;
    html += `
      <a class="tool" href="${t[1]}" target="_blank">
        <img src="${icon}">
        <div>
          <b>${t[0]}</b>
          <small>${t[2]}</small>
        </div>
      </a>
    `;
  });

  div.innerHTML = html;
  return div;
}

const app = document.getElementById("app");
data.forEach(cat => app.appendChild(createCategory(cat)));

</script>

</body>
</html>
