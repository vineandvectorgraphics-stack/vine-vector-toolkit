<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>

/* =========================
   BASE + PAPER BACKGROUND
========================= */
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Arial;
  background:
    repeating-linear-gradient(
      to bottom,
      #ffffff 0px,
      #ffffff 28px,
      #e9e9e9 29px
    );
  background-attachment: fixed;
  color:#141414;
}

/* soft wash */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.75), rgba(245,247,255,0.7));
  pointer-events:none;
}

/* =========================
   HEADER
========================= */
header{
  text-align:center;
  padding:60px 20px 10px;
}

h1{
  margin:0;
  font-size:44px;
}

.subtitle{
  color:#666;
  margin-top:8px;
}

/* =========================
   SEARCH
========================= */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

input{
  width:420px;
  max-width:90%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  background:rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  outline:none;
}

/* =========================
   FAVORITES BAR
========================= */
.favorites{
  margin:10px auto 20px;
  max-width:1100px;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.pill{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(0,0,0,0.08);
  cursor:pointer;
}

/* =========================
   MASONRY LAYOUT
========================= */
.grid{
  column-count:3;
  column-gap:18px;
  padding:30px 35px 80px;
}

@media(max-width:1000px){ .grid{column-count:2;} }
@media(max-width:650px){ .grid{column-count:1;} }

/* =========================
   CATEGORY CARD
========================= */
.category{
  break-inside: avoid;
  margin-bottom:18px;

  background:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.7);
  backdrop-filter: blur(16px);

  border-radius:18px;
  padding:12px;

  box-shadow:0 10px 30px rgba(0,0,0,0.05);

  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* CATEGORY HEADER */
.category h2{
  font-size:12px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  margin:6px 0 10px;
  cursor:pointer;
}

/* TOOL */
.tool{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  padding:9px;
  margin:6px 0;
  border-radius:12px;

  background:rgba(255,255,255,0.4);
  border:1px solid rgba(255,255,255,0.6);

  transition:0.18s ease;
}

.tool:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,0.75);
  box-shadow:0 10px 20px rgba(0,0,0,0.06);
}

.tool img{
  width:22px;
  height:22px;
  border-radius:6px;
}

.tool b{font-size:13px;}
.tool small{font-size:11px;color:#777;}

.hidden{display:none;}

.collapsed .tool{
  display:none;
}

</style>
</head>

<body>

<header>
  <h1>Vine & Vector Toolkit</h1>
  <div class="subtitle">Pinterest × Milanote creative dashboard</div>
</header>

<div class="searchWrap">
  <input id="search" placeholder="Search tools or categories..." />
</div>

<div class="favorites">
  <div class="pill">⭐ Adobe Firefly</div>
  <div class="pill">⭐ Figma</div>
  <div class="pill">⭐ Perplexity</div>
  <div class="pill">⭐ Photopea</div>
</div>

<div class="grid" id="app"></div>

<script>

const data = [
{
name:"AI Creation Suite",
tools:[
["Adobe Firefly","https://firefly.adobe.com","AI"],
["Claude","https://claude.ai","AI"],
["Perplexity","https://perplexity.ai","Search"],
["Leonardo AI","https://leonardo.ai","Image"],
["Runway","https://runwayml.com","Video"],
["Suno","https://suno.com","Music"]
]
},
{
name:"Design Assets",
tools:[
["Unsplash","https://unsplash.com","Photo"],
["Freepik","https://freepik.com","Assets"],
["SVG Repo","https://svgrepo.com","SVG"],
["Blush","https://blush.design","Illustration"]
]
},
{
name:"Mockups",
tools:[
["Mockup World","https://mockupworld.co","Mockups"],
["Pacdora","https://pacdora.com","Packaging"],
["Screely","https://screely.com","Screens"]
]
},
{
name:"Dev Tools",
tools:[
["Figma","https://figma.com","Design"],
["CodePen","https://codepen.io","Code"],
["StackBlitz","https://stackblitz.com","IDE"]
]
}
];

/* =========================
   RENDER
========================= */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category";

    let html = `<h2 onclick="toggle(this)">${cat.name}</h2>`;

    cat.tools.forEach(t=>{
      const icon = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;

      html += `
        <a class="tool" href="${t[1]}" target="_blank">
          <img src="${icon}">
          <div>
            <b>${t[0]}</b>
            <small>${t[2]}</small>
          </div>
        </a>
      `;
    });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* =========================
   COLLAPSE
========================= */
function toggle(el){
  el.parentElement.classList.toggle("collapsed");
}

/* =========================
   SEARCH FILTER
========================= */
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();

  document.querySelectorAll(".category").forEach(cat=>{
    const text = cat.innerText.toLowerCase();
    cat.style.display = text.includes(val) ? "block" : "none";
  });
});

</script>

</body>
</html>
