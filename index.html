<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>
/* =========================
   BACKGROUND (PAPER)
========================= */
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Arial;
  background:
    repeating-linear-gradient(
      to bottom,
      #ffffff 0px,
      #ffffff 28px,
      #ececec 29px
    );
  color:#111;
}

/* soft overlay glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.7), rgba(240,242,255,0.6));
  pointer-events:none;
}

/* =========================
   HEADER
========================= */
header{
  text-align:center;
  padding:50px 20px 10px;
}

h1{
  margin:0;
  font-size:42px;
  letter-spacing:-0.5px;
}

.subtitle{
  color:#666;
  margin-top:8px;
}

/* =========================
   SEARCH
========================= */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

input{
  width:420px;
  max-width:90%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  outline:none;
}

/* =========================
   GRID
========================= */
.grid{
  column-count:3;
  column-gap:18px;
  padding:30px 35px 80px;
}

@media(max-width:1000px){ .grid{column-count:2;} }
@media(max-width:650px){ .grid{column-count:1;} }

/* =========================
   CATEGORY CARD (GLASS)
========================= */
.category{
  break-inside: avoid;
  margin-bottom:18px;

  background:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.8);
  backdrop-filter: blur(16px);

  border-radius:18px;
  padding:12px;

  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* category title */
.category h2{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin:6px 0 10px;
  cursor:pointer;
}

/* TOOL */
.tool{
  display:flex;
  align-items:center;
  gap:10px;

  text-decoration:none;
  padding:10px;
  margin:6px 0;

  border-radius:12px;

  background:rgba(255,255,255,0.45);
  border:1px solid rgba(255,255,255,0.7);

  transition:0.15s ease;
}

.tool:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.8);
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.tool img{
  width:22px;
  height:22px;
  border-radius:6px;
}

.tool b{font-size:13px;}
.tool small{font-size:11px;color:#666;}

.collapsed .tool{
  display:none;
}

/* SEARCH HIDE */
.hidden{display:none;}
</style>
</head>

<body>

<header>
  <h1>Vine & Vector Toolkit</h1>
  <div class="subtitle">Creative freelancer resource dashboard</div>
</header>

<div class="searchWrap">
  <input id="search" placeholder="Search tools or categories..." />
</div>

<div class="grid" id="app"></div>

/* =========================
   RENDER
========================= */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category";

    let html = `<h2 onclick="toggle(this)">${cat.name}</h2>`;

    cat.tools.forEach(t=>{
      const icon = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(t[1]).hostname}`;

      html += `
        <a class="tool" href="${t[1]}" target="_blank">
          <img src="${icon}">
          <div>
            <b>${t[0]}</b><br>
            <small>${t[2]}</small>
          </div>
        </a>
      `;
    });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* collapse */
function toggle(el){
  el.parentElement.classList.toggle("collapsed");
}

/* search */
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();

  document.querySelectorAll(".category").forEach(cat=>{
    cat.style.display = cat.innerText.toLowerCase().includes(val)
      ? "block"
      : "none";
  });
});
</script>
