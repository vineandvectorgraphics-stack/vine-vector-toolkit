<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vine & Vector | Creative Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<div class="hero-inner">

<h1>Vine & Vector</h1>

<h2>Creative Library</h2>

<p>
A curated collection of design tools, AI resources,
creative inspiration, maps, mockups, assets,
and internet discoveries.
</p>

<input
id="search"
type="text"
placeholder="Search resources..."

>

</div>

</header>

<nav id="nav"></nav>

<section class="featured">

<h2>⭐ Featured Resources</h2>

<div class="featured-grid">

<a href="https://chatgpt.com" target="_blank">
🤖 ChatGPT
</a>

<a href="https://claude.ai" target="_blank">
🧠 Claude
</a>

<a href="https://firefly.adobe.com" target="_blank">
🔥 Adobe Firefly
</a>

<a href="https://www.behance.net" target="_blank">
🎨 Behance
</a>

<a href="https://mobbin.com" target="_blank">
📱 Mobbin
</a>

<a href="https://mapbox.com/studio" target="_blank">
🗺️ Mapbox Studio
</a>

</div>

</section>

<main id="app"></main>

<script src="data.js"></script>

<script>

const app =
document.getElementById("app");

const nav =
document.getElementById("nav");

const groups = [

{
title:"🌼 CREATE",

categories:[
"AI & Generative Tools",
"Branding & Identity",
"Typography & Fonts",
"Color & Gradients",
"Image Editing & Optimization",
"Illustration Libraries",
"Stock Assets & Vectors",
"Mockups"
]
},

{
title:"💡 INSPIRE",

categories:[
"Design Inspiration",
"Maps, Geography & Travel",
"Creative Experiments"
]
},

{
title:"🛠 BUILD",

categories:[
"Web Design & UI Systems",
"Coding & Development",
"3D, Motion & Animation",
"Audio & Music"
]
},

{
title:"🌱 GROW",

categories:[
"Productivity & Collaboration",
"Portfolio & Freelance",
"Learning & Education"
]
}

];

function render(){

app.innerHTML="";
nav.innerHTML="";

groups.forEach(group=>{

app.innerHTML += `

<div class="section-header">

<h2>${group.title}</h2>

</div>

`;

group.categories.forEach(categoryName=>{

const category =
data.find(item =>
item.name === categoryName
);

if(!category) return;

nav.innerHTML += `

<a href="#${category.name}">
${category.icon}
${category.name}
</a>

`;

let cards="";

category.tools.forEach(tool=>{

cards += `

<a
class="tool"
href="${tool.url}"
target="_blank">

<img
class="tool-logo"
src="${tool.logo}"
alt="${tool.name}"
loading="lazy">

<h3>${tool.name}</h3>

<p>
${tool.description}
</p>

<div class="tags">

${tool.tags.map(tag =>
`<span>${tag}</span>`
).join("")}

</div>

</a>

`;

});

app.innerHTML += `

<section
class="category"
id="${category.name}">

<h2
class="category-title"
style="
color:${category.color};
">

${category.icon}
${category.name}

</h2>

<div class="grid">

${cards}

</div>

</section>

`;

});

});

}

render();

document
.getElementById("search")
.addEventListener("input",e=>{

const search =
e.target.value.toLowerCase();

document
.querySelectorAll(".tool")
.forEach(card=>{

const text =
card.textContent.toLowerCase();

card.style.display =
text.includes(search)
? "block"
: "none";

});

});

</script>

</body>

</html>
