<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vine & Vector Toolkit</title>

<style>
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, Arial;
  background:
    repeating-linear-gradient(
      to bottom,
      #ffffff 0px,
      #ffffff 28px,
      #f0f0f0 29px
    );
  color:#111;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px 10px;
}

h1{
  margin:0;
  font-size:40px;
  color:#000;
}

.subtitle{
  color:#666;
  margin-top:8px;
}

/* SEARCH */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

input{
  width:420px;
  max-width:90%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  background:white;
}

/* GRID */
.grid{
  column-count:3;
  column-gap:18px;
  padding:30px;
}

@media(max-width:1000px){ .grid{column-count:2;} }
@media(max-width:650px){ .grid{column-count:1;} }

/* CATEGORY CARD */
.category{
  break-inside: avoid;
  margin-bottom:18px;
  border-radius:16px;
  padding:14px;
  background:rgba(255,255,255,0.75);
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* HEADER */
.catTitle{
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

/* TOOL */
.tool{
  display:flex;
  gap:10px;
  padding:8px;
  margin:6px 0;
  border-radius:10px;
  text-decoration:none;
  color:#111;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(0,0,0,0.04);
}

.tool:hover{
  background:white;
  transform:translateY(-1px);
}

.tool img{
  width:18px;
  height:18px;
  border-radius:4px;
}
small{color:#666;}
</style>
</head>

<body>

<header>
  <h1>Vine & Vector Toolkit</h1>
  <div class="subtitle">Freelancer creative resource hub</div>
</header>

<div class="searchWrap">
  <input id="search" placeholder="Search tools..." />
</div>

<div class="grid" id="app"></div>

<script>

const data = [

{
name:"Generative AI",
color:"#7c5cff",
tools:[
["Adobe Firefly","https://firefly.adobe.com"],
["Artbreeder","https://artbreeder.com"],
["Claude","https://claude.ai"],
["DeepAI","https://deepai.org"],
["ElevenLabs","https://elevenlabs.io"],
["Google Labs","https://labs.google.com"],
["Hugging Face Spaces","https://huggingface.co/spaces"],
["Krea AI","https://krea.ai"],
["Leonardo AI","https://leonardo.ai"],
["Luma AI","https://lumalabs.ai"],
["Napkin AI","https://napkin.ai"],
["Perplexity","https://perplexity.ai"],
["Pika","https://pika.art"],
["Playground AI","https://playgroundai.com"],
["Runway","https://runwayml.com"],
["Stable Diffusion","https://stability.ai"],
["Suno","https://suno.com"],
["Udio","https://udio.com"],
["Unicorn Studio","https://unicorn.studio"]
]
},

{
name:"Design Platforms",
color:"#ff006e",
tools:[
["Adobe","https://adobe.com"],
["Canva","https://canva.com"],
["Figma","https://figma.com"],
["Framer","https://framer.com"],
["Sketch","https://sketch.com"],
["Webflow","https://webflow.com"],
["Affinity Designer","https://affinity.serif.com"],
["Affinity Photo","https://affinity.serif.com"]
]
},

{
name:"Branding & Inspiration",
color:"#ff4d6d",
tools:[
["Behance","https://behance.net"],
["Dribbble","https://dribbble.com"],
["BrandNew","https://underconsideration.com/brandnew"],
["BP&O","https://bpando.org"],
["Identity Designed","https://identitydesigned.com"],
["Cosmos","https://cosmos.so"]
]
},

{
name:"Free Photos",
color:"#8ac926",
tools:[
["Unsplash","https://unsplash.com"],
["Pexels","https://pexels.com"],
["Pixabay","https://pixabay.com"],
["Nappy","https://nappy.co"],
["Openverse","https://openverse.org"],
["BarnImages","https://barnimages.com"],
["Burst","https://burst.shopify.com"]
]
},

{
name:"Illustrations & Icons",
color:"#06d6a0",
tools:[
["DrawKit","https://drawkit.com"],
["Blush","https://blush.design"],
["Humaaans","https://humaaans.com"],
["Open Doodles","https://opendoodles.com"],
["Icons8","https://icons8.com"],
["SVG Repo","https://svgrepo.com"]
]
},

{
name:"Mockups",
color:"#ffb703",
tools:[
["Mockup World","https://mockupworld.co"],
["LS Graphics","https://ls.graphics"],
["Placeit","https://placeit.net"],
["Smartmockups","https://smartmockups.com"],
["Pacdora","https://pacdora.com"],
["Mockuuups","https://mockuuups.studio"]
]
},

{
name:"Typography",
color:"#3a86ff",
tools:[
["Google Fonts","https://fonts.google.com"],
["Fontshare","https://fontshare.com"],
["Type Scale","https://type-scale.com"],
["Font Joy","https://fontjoy.com"],
["Typ.io","https://typ.io"]
]
},

{
name:"Color Tools",
color:"#8338ec",
tools:[
["Coolors","https://coolors.co"],
["Happy Hues","https://happyhues.co"],
["Shader Gradient","https://shadergradient.co"]
]
},

{
name:"Freelancer Tools",
color:"#4361ee",
tools:[
["Notion","https://notion.so"],
["Milanote","https://milanote.com"],
["Toggl","https://toggl.com"],
["Stripe","https://stripe.com"],
["Calendly","https://calendly.com"]
]
},

{
name:"Fun",
color:"#ff595e",
tools:[
["GeoFS","https://geo-fs.com"],
["Draw a Fish","https://drawafish.com"],
["MyRetroTVs","https://myretrotvs.com"],
["White Screen","https://whitescreen.online"]
]
}

];

/* RENDER */
const app = document.getElementById("app");

function render(){
  app.innerHTML="";

  data.forEach(cat=>{
    const div = document.createElement("div");
    div.className="category";

    let html = `
      <div class="catTitle" style="color:${cat.color}">
        <span>${cat.name}</span>
      </div>
    `;

    cat.tools.forEach(t=>{
      const icon = "https://www.google.com/s2/favicons?sz=64&domain=" + new URL(t[1]).hostname;

      html += `
        <a class="tool" href="${t[1]}" target="_blank">
          <img src="${icon}">
          <div>
            <b>${t[0]}</b><br>
            <small>${t[1].replace("https://","")}</small>
          </div>
        </a>
      `;
    });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  const v = e.target.value.toLowerCase();

  document.querySelectorAll(".category").forEach(cat=>{
    cat.style.display = cat.innerText.toLowerCase().includes(v)
      ? "block"
      : "none";
  });
});
</script>

</body>
</html>
