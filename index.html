<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creative Playground Atlas</title>

<style>
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, Arial;
  background:#faf9f6;
  color:#111;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px 10px;
}

h1{
  font-size:44px;
  margin:0;
  letter-spacing:-1px;
}

.subtitle{
  color:#666;
  margin-top:8px;
}

/* TOP ACTIONS */
.actions{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
  flex-wrap:wrap;
}

button{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
  transition:0.2s ease;
}

button:hover{
  transform:translateY(-2px);
}

/* SEARCH */
.searchWrap{
  display:flex;
  justify-content:center;
  margin:10px 0 30px;
}

input{
  width:420px;
  max-width:90%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* GRID */
.grid{
  column-count:3;
  column-gap:18px;
  padding:20px 30px 80px;
}

@media(max-width:1000px){ .grid{column-count:2;} }
@media(max-width:650px){ .grid{column-count:1;} }

/* BOARD */
.board{
  break-inside: avoid;
  margin-bottom:18px;
  padding:16px;
  border-radius:18px;
  background:white;
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  transition:0.2s ease;
}

.board:hover{
  transform:translateY(-3px);
}

.boardTitle{
  font-size:14px;
  font-weight:800;
  letter-spacing:1px;
}

.boardDesc{
  font-size:12px;
  color:#666;
  margin-bottom:10px;
}

/* TOOL */
.tool{
  display:flex;
  gap:10px;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  text-decoration:none;
  color:#111;
  background:#fafafa;
  border:1px solid rgba(0,0,0,0.04);
  transition:0.15s ease;
}

.tool:hover{
  transform:scale(1.02);
  background:white;
}

.tool img{
  width:18px;
  height:18px;
  border-radius:4px;
}

small{
  display:block;
  font-size:11px;
  color:#666;
}

.tags{
  font-size:10px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h1>Creative Playground Atlas</h1>
  <div class="subtitle">A living map of creative tools, experiments, and rabbit holes</div>

  <div class="actions">
    <button onclick="surpriseMe()">🎲 Surprise Me</button>
  </div>
</header>

<div class="searchWrap">
  <input id="search" placeholder="Search tools, ideas, AI, design..." />
</div>

<div class="grid" id="app"></div>

<script>

{

desc:"creative rabbit holes and playful experiments",
tools:[
["GeoFS","https://geo-fs.com","flight simulator","Fun"],
["Draw a Fish","https://drawafish.com","interactive art toy","Fun"],

]

];

/* =========================
RENDER
========================= */

const app = document.getElementById("app");

function render(){
  app.innerHTML = "";

  data.forEach(board=>{
    const div = document.createElement("div");
    div.className = "board";

    let html = `
      <div class="boardTitle">${board.name}</div>
      <div class="boardDesc">${board.desc}</div>
    `;

    board.tools.forEach(t=>{
      const icon = "https://www.google.com/s2/favicons?sz=64&domain=" + new URL(t[1]).hostname;

      html += `
        <a class="tool" href="${t[1]}" target="_blank">
          <img src="${icon}">
          <div>
            <b>${t[0]}</b>
            <small>${t[2]}</small>
            <div class="tags">${t[3]}</div>
          </div>
        </a>
      `;
    });

    div.innerHTML = html;
    app.appendChild(div);
  });
}

render();

/* =========================
SURPRISE ME
========================= */

function surpriseMe(){
  const all = data.flatMap(b => b.tools);
  const pick = all[Math.floor(Math.random()*all.length)];
  window.open(pick[1], "_blank");
}

/* =========================
SEARCH
========================= */

document.getElementById("search").addEventListener("input", e=>{
  const v = e.target.value.toLowerCase();

  document.querySelectorAll(".board").forEach(board=>{
    board.style.display = board.innerText.toLowerCase().includes(v)
      ? "block"
      : "none";
  });
});

</script>

</body>
</html>
